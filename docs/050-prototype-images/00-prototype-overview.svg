<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 44px Inter, Arial, sans-serif; fill: #f4f4f5; }
      .subtitle { font: 400 20px Inter, Arial, sans-serif; fill: #a1a1aa; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #f4f4f5; }
      .small { font: 500 13px Inter, Arial, sans-serif; fill: #a1a1aa; }
      .chip { font: 700 11px Inter, Arial, sans-serif; fill: #c4b5fd; }
      .panel { fill: #18181b; stroke: #27272a; stroke-width: 2; filter: url(#shadow); }
      .surface { fill: #27272a; }
      .field { fill: #09090b; stroke: #3f3f46; stroke-width: 1.5; }
      .primary { fill: #8b5cf6; }
      .success { fill: #10b981; }
      .warning { fill: #f59e0b; }
      .error { fill: #ef4444; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <text class="title" x="80" y="90">Text-to-Comic App - UI/UX Prototype Board</text>
  <text class="subtitle" x="80" y="126">AI tao storyboard, nguoi dung chinh sua, render panel, them speech bubble va export webtoon.</text>

  <g transform="translate(80 190)">
    <rect class="panel" width="280" height="260" rx="12"/>
    <rect class="surface" x="20" y="24" width="240" height="38" rx="8"/>
    <text class="label" x="34" y="49">01 Dashboard</text>
    <rect class="field" x="20" y="84" width="240" height="46" rx="8"/>
    <rect class="field" x="20" y="144" width="240" height="46" rx="8"/>
    <rect class="field" x="20" y="204" width="150" height="28" rx="14"/>
    <text class="small" x="34" y="113">Project cards + status</text>
    <text class="small" x="34" y="173">Continue draft work</text>
    <text class="chip" x="42" y="223">NEW PROJECT</text>
  </g>

  <g transform="translate(390 190)">
    <rect class="panel" width="280" height="260" rx="12"/>
    <rect class="surface" x="20" y="24" width="240" height="38" rx="8"/>
    <text class="label" x="34" y="49">02 Text Import</text>
    <rect class="field" x="20" y="84" width="240" height="26" rx="6"/>
    <rect class="field" x="20" y="124" width="240" height="86" rx="8"/>
    <rect class="primary" x="122" y="224" width="138" height="28" rx="14"/>
    <text class="small" x="34" y="101">Title</text>
    <text class="small" x="34" y="154">Story text area</text>
    <text class="chip" x="146" y="243">ANALYZE</text>
  </g>

  <g transform="translate(700 190)">
    <rect class="panel" width="360" height="260" rx="12"/>
    <rect class="surface" x="18" y="20" width="86" height="220" rx="8"/>
    <rect class="field" x="122" y="20" width="220" height="52" rx="8"/>
    <rect class="field" x="122" y="88" width="220" height="52" rx="8"/>
    <rect class="field" x="122" y="156" width="220" height="52" rx="8"/>
    <rect class="success" x="222" y="222" width="120" height="26" rx="13"/>
    <text class="label" x="28" y="48">03</text>
    <text class="small" x="28" y="74">Casting</text>
    <text class="small" x="140" y="51">Panel cards</text>
    <text class="chip" x="244" y="240">GENERATE</text>
  </g>

  <g transform="translate(1090 190)">
    <rect class="panel" width="280" height="260" rx="12"/>
    <rect class="field" x="34" y="26" width="212" height="166" rx="10"/>
    <rect class="surface" x="56" y="48" width="168" height="112" rx="8"/>
    <rect fill="#ffffff" x="78" y="62" width="96" height="36" rx="18"/>
    <path d="M94 96 L82 116 L112 101 Z" fill="#ffffff"/>
    <rect class="primary" x="34" y="212" width="44" height="32" rx="8"/>
    <rect class="surface" x="90" y="212" width="44" height="32" rx="8"/>
    <rect class="surface" x="146" y="212" width="44" height="32" rx="8"/>
    <text class="label" x="34" y="246">04 Comic Editor</text>
  </g>

  <g transform="translate(580 540)">
    <rect class="panel" width="440" height="260" rx="12"/>
    <rect class="surface" x="34" y="32" width="372" height="54" rx="10"/>
    <text class="label" x="54" y="66">05 Export Comic</text>
    <rect class="field" x="34" y="110" width="372" height="34" rx="8"/>
    <rect class="warning" x="34" y="162" width="372" height="34" rx="8"/>
    <rect class="primary" x="250" y="216" width="156" height="30" rx="15"/>
    <text class="small" x="54" y="133">PNG vertical export is MVP</text>
    <text class="small" x="54" y="185" fill="#111827">Warn if some panels are missing</text>
    <text class="chip" x="290" y="236">EXPORT PNG</text>
  </g>

  <path d="M360 320 H390" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <path d="M670 320 H700" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <path d="M1060 320 H1090" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <path d="M1230 450 C1230 570 1020 600 1020 670" stroke="#8b5cf6" stroke-width="4" fill="none" stroke-linecap="round"/>

  <text class="subtitle" x="80" y="900">MVP path: New project -> Analyze story -> Edit storyboard -> Generate panels -> Edit bubbles -> Export PNG.</text>
</svg>
